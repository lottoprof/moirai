name = "moirai"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# После любой правки этого файла — выполнить:
#   corepack pnpm exec wrangler types
# и закоммитить worker-configuration.d.ts вместе с wrangler.toml.

# ============================================================
# D1 — основная реляционная БД (Architecture v0.8.2 §9).
# Создана 2026-05-13, region ENAM.
# ============================================================
[[d1_databases]]
binding         = "DB"
database_name   = "moirai-prod"
database_id     = "14d13be4-07a7-47fc-aa92-3dbe8840c0b6"
migrations_dir  = "migrations"

# ============================================================
# KV — короткоживущие данные для auth flow (Stage 19).
# ============================================================

# PKCE state + verifier для OAuth flow (TTL ~10 мин)
[[kv_namespaces]]
binding = "KV_OAUTH_STATE"
id      = "dda85b650a914602b94cfe39462edabd"

# Email verification + password reset токены (TTL ~1 ч)
[[kv_namespaces]]
binding = "KV_VERIFY_TOKENS"
id      = "13731e63893d4077b391688a0b0fdc22"

# Rate-limit counters для auth endpoints (TTL = window)
[[kv_namespaces]]
binding = "KV_RATELIMIT"
id      = "67ba23d314ae46dca543deb2bf175562"

# General short-TTL cache: JWT active-key cache (5 мин) + creation lock
# Architecture §9 v0.8.3 / decisions_archive 2026-05-14
[[kv_namespaces]]
binding = "KV_CACHE"
id      = "e25c15615afa4732a82fed14e9282636"

# ============================================================
# R2 — содержимое модулей (student_book bodies, изображения, видео).
# Stage 22: подключён `moirai-content` bucket — source of truth для
# тел модулей. Метаданные в D1 (`modules.body_r2_key` хранит путь:
# modules/{slug}.{locale}.md). Sprint 2: добавим bucket для media
# (instructor photos, og-images) если понадобится отдельный namespace.
# ============================================================
[[r2_buckets]]
binding     = "MODULE_CONTENT"
bucket_name = "moirai-content"

# Student LK v2 Stage C: homework submissions bucket. Содержит
# uploads студентов (видео/PDF/etc до 100 MB) + annotated copies
# инструкторов. R2 path: 'homework/{enrollment_id}/{submission_id}.<ext>'
# и 'homework/{enrollment_id}/{submission_id}.annotated.<ext>'.
# Создать bucket в CF dashboard или через `wrangler r2 bucket create
# moirai-homework`. Secrets для pre-signed URL (S3-compatible API):
# R2_ACCESS_KEY_ID + R2_SECRET_ACCESS_KEY + R2_ACCOUNT_ID через
# `wrangler pages secret put`.
[[r2_buckets]]
binding     = "HOMEWORK_BUCKET"
bucket_name = "moirai-homework"

# ============================================================
# Public vars — версионируются в репо. Только публичные значения.
# Секреты — через `wrangler pages secret put` (не сюда).
# ============================================================
[vars]
# Cloudflare Turnstile public site key — рендерится на login/register
# в HTML как <div data-sitekey="...">. Парный TURNSTILE_SECRET для
# server-side siteverify лежит в wrangler pages secret.
TURNSTILE_SITE_KEY = "0x4AAAAAADOrL7Hh2geV-KJG"

# Student LK v2 Stage C: R2 bucket name + account ID для pre-signed
# URL generation. Эти значения публичные (bucket name visible в URL),
# access key + secret через `wrangler pages secret put`.
R2_HOMEWORK_BUCKET = "moirai-homework"
# R2_ACCOUNT_ID — добавить в wrangler secrets, не в [vars] (account ID
# semi-sensitive; bucket name OK).
